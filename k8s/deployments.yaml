apiVersion: v1
kind: Namespace
metadata:
  name: microservices-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: microservices-demo
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
        - name: auth-service
          image: <ECR_REGISTRY>/auth-service:latest
          ports: [{ containerPort: 4001 }]
          env:
            - name: PORT
              value: "4001"
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: app-secrets, key: jwt-secret } }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: microservices-demo
spec:
  selector: { app: auth-service }
  ports: [{ port: 4001, targetPort: 4001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: microservices-demo
spec:
  replicas: 3
  selector:
    matchLabels: { app: product-service }
  template:
    metadata:
      labels: { app: product-service }
    spec:
      containers:
        - name: product-service
          image: <ECR_REGISTRY>/product-service:latest
          ports: [{ containerPort: 4002 }]
          env:
            - name: PORT
              value: "4002"
          resources:
            requests: { cpu: "150m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 4002 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /health, port: 4002 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: microservices-demo
spec:
  selector: { app: product-service }
  ports: [{ port: 4002, targetPort: 4002 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service-hpa
  namespace: microservices-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices-demo
spec:
  replicas: 2
  selector:
    matchLabels: { app: order-service }
  template:
    metadata:
      labels: { app: order-service }
    spec:
      containers:
        - name: order-service
          image: <ECR_REGISTRY>/order-service:latest
          ports: [{ containerPort: 4003 }]
          env:
            - name: PORT
              value: "4003"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service.microservices-demo.svc.cluster.local:4002"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 4003 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: microservices-demo
spec:
  selector: { app: order-service }
  ports: [{ port: 4003, targetPort: 4003 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: microservices-demo
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: gateway
          image: <ECR_REGISTRY>/gateway:latest
          ports: [{ containerPort: 4000 }]
          env:
            - name: PORT
              value: "4000"
            - name: AUTH_URL
              value: "http://auth-service.microservices-demo.svc.cluster.local:4001"
            - name: ORDER_URL
              value: "http://order-service.microservices-demo.svc.cluster.local:4003"
            - name: PRODUCT_URLS
              value: "http://product-service.microservices-demo.svc.cluster.local:4002"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: microservices-demo
spec:
  type: ClusterIP
  selector: { app: gateway }
  ports: [{ port: 4000, targetPort: 4000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: microservices-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
